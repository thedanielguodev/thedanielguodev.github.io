<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unblocker</title>
    <style>
        body { margin:0; background:#111; color:#fff; font-family:Arial; overflow:hidden; }
        .header { position:fixed; top:0; left:0; width:100%; background:rgba(0,0,0,0.95); padding:10px; z-index:1000; display:flex; gap:8px; box-shadow:0 2px 10px #000; }
        input { flex:1; padding:12px; font-size:17px; background:#222; border:none; border-radius:6px; color:white; }
        button { padding:12px 20px; background:#0066ff; border:none; border-radius:6px; color:white; cursor:pointer; font-size:16px; }
        iframe { width:100vw; height:100vh; border:none; margin-top:60px; }
    </style>
</head>
<body>
    <div class="header">
        <input type="text" id="url" placeholder="Enter any website (youtube.com, roblox.com, etc)" autocomplete="off">
        <button onclick="go()">Go</button>
    </div>

    <iframe id="frame"></iframe>

    <script>
        function go() {
            let input = document.getElementById('url').value.trim();
            if (!input) return alert("Type a website!");

            if (!input.startsWith('http')) input = 'https://' + input;

            // Try a few different public proxy methods (replace with currently working ones)
            // Option 1: Direct (often blocked)
            // document.getElementById('frame').src = input;

            // Option 2: Common proxy wrapper (change to one that currently works for you)
            const proxy = "https://your-working-proxy.example.com/proxy/";   // ← Change this
            document.getElementById('frame').src = proxy + encodeURIComponent(input);
        }

        // Press Enter to go
        document.getElementById('url').addEventListener("keypress", function(e) {
            if (e.key === "Enter") go();
        });
    </script>
</body>
</html>
